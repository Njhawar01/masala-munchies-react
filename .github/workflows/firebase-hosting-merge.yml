name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env file from GitHub Secrets
        run: |
          echo "VITE_FIREBASE_URL=${{ secrets.VITE_FIREBASE_URL }}" >> .env
          echo "VITE_PHONE_NUMBER=${{ secrets.VITE_PHONE_NUMBER }}" >> .env
          echo "VITE_BRAND_NAME=${{ secrets.VITE_BRAND_NAME }}" >> .env
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MASALA_MUNCHIES_5CDF5 }}'
          projectId: masala-munchies-5cdf5
          channelId: live